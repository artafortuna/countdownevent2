<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtaTimer - Aplikasi Hitung Mundur Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi agar Tailwind mendukung class-based dark mode
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Efek transisi halus saat ganti tema */
        body, nav, div, form, input, select, footer {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .animate-spin-slow {
            animation: spin 6s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <div>
        <nav class="bg-white/80 dark:bg-slate-800/50 backdrop-blur-md border-b border-slate-200 dark:border-slate-700/50 px-6 py-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-indigo-500 to-purple-500 text-white p-2.5 rounded-xl shadow-lg font-bold text-xl">
                    <i class="fa-solid fa-hourglass-half animate-spin-slow"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wide bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">ArtaTimer by Arta Makmur Jaya Sentosa</h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Event Countdown Manager</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" id="theme-toggle-btn" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-amber-400 border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:scale-105 transition cursor-pointer shadow-inner">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <div class="text-xs bg-slate-100 dark:bg-slate-700/50 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-600/40 text-slate-600 dark:text-slate-300 font-semibold shadow-inner">
                    <i class="fa-solid fa-calendar-day text-indigo-500 dark:text-indigo-400 mr-1"></i> <span id="live-clock">--:--:--</span>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/60 p-6 rounded-2xl shadow-xl backdrop-blur-sm lg:col-span-1 h-fit sticky top-24">
                <h3 class="text-base font-bold text-slate-800 dark:text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-calendar-plus text-indigo-500 dark:text-indigo-400"></i> Buat Acara Baru
                </h3>
                
                <form id="event-form" onsubmit="addEvent(event)" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Nama Acara / Kegiatan</label>
                        <input type="text" id="event-name" required class="w-full bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 font-medium" placeholder="Contoh: Tahun Baru, Liburan Bali...">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Tanggal & Waktu</label>
                            <input type="datetime-local" id="event-date" required class="w-full bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-xs text-slate-900 dark:text-white font-medium">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Kategori</label>
                            <select id="event-category" class="w-full bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-xs text-slate-700 dark:text-slate-300 font-semibold">
                                <option value="✈️ Liburan">✈️ Liburan</option>
                                <option value="🎂 Ulang Tahun">🎂 Ulang Tahun</option>
                                <option value="💼 Pekerjaan/Tugas">💼 Pekerjaan/Tugas</option>
                                <option value="🎯 Target Personal">🎯 Target Personal</option>
                                <option value="📌 Lainnya">📌 Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Tema Warna Card</label>
                        <div class="grid grid-cols-4 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="theme" value="from-blue-600 to-indigo-900" checked class="sr-only peer">
                                <div class="w-full h-8 rounded-lg bg-gradient-to-r from-blue-500 to-indigo-700 border-2 border-transparent peer-checked:border-slate-700 dark:peer-checked:border-white transition shadow-md"></div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="theme" value="from-emerald-600 to-teal-900" class="sr-only peer">
                                <div class="w-full h-8 rounded-lg bg-gradient-to-r from-emerald-500 to-teal-700 border-2 border-transparent peer-checked:border-slate-700 dark:peer-checked:border-white transition shadow-md"></div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="theme" value="from-purple-600 to-fuchsia-900" class="sr-only peer">
                                <div class="w-full h-8 rounded-lg bg-gradient-to-r from-purple-500 to-fuchsia-700 border-2 border-transparent peer-checked:border-slate-700 dark:peer-checked:border-white transition shadow-md"></div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="theme" value="from-rose-600 to-red-950" class="sr-only peer">
                                <div class="w-full h-8 rounded-lg bg-gradient-to-r from-rose-500 to-red-700 border-2 border-transparent peer-checked:border-slate-700 dark:peer-checked:border-white transition shadow-md"></div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-indigo-500/20 cursor-pointer text-sm">
                        <i class="fa-solid fa-plus mr-1"></i> Tambahkan ke Daftar
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/60 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-3 backdrop-blur-sm shadow-sm">
                    <div class="text-sm font-bold text-slate-700 dark:text-slate-300">
                        <i class="fa-solid fa-list-check text-purple-500 dark:text-purple-400 mr-1"></i> Linimasa Acara (<span id="total-events">0</span>)
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="setFilter('all')" id="btn-filter-all" class="flex-1 sm:flex-none px-3 py-1.5 rounded-xl text-xs font-bold bg-indigo-600 text-white transition">Semua</button>
                        <button onclick="setFilter('active')" id="btn-filter-active" class="flex-1 sm:flex-none px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 transition">Berjalan</button>
                        <button onclick="setFilter('passed')" id="btn-filter-passed" class="flex-1 sm:flex-none px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 transition">Selesai</button>
                    </div>
                </div>

                <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>

                <div id="empty-state" class="bg-slate-200/40 dark:bg-slate-800/20 border border-dashed border-slate-300 dark:border-slate-700 p-12 rounded-2xl text-center text-slate-400 dark:text-slate-500 hidden">
                    <i class="fa-solid fa-hourglass-empty text-4xl mb-3 text-slate-300 dark:text-slate-600"></i>
                    <p class="text-sm font-medium">Belum ada acara terdaftar. Silakan buat satu di menu kiri!</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full text-center py-5 text-xs text-slate-400 dark:text-slate-500 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 mt-12">
        <p>&copy; 2026 <span class="font-bold text-slate-600 dark:text-slate-400 tracking-wide">PT Arta Makmur Jaya Sentosa</span>. All rights reserved.</p>
    </footer>

    <script>
        // Database internal berbasis LocalStorage
        let events = JSON.parse(localStorage.getItem('arta_events_data')) || [];
        let currentFilter = 'all';

        // Manajemen Tema (Light / Night Mode)
        const htmlElement = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');
        
        // Load tema tersimpan awal
        const savedTheme = localStorage.getItem('arta_theme') || 'dark'; // default night mode
        if (savedTheme === 'dark') {
            htmlElement.classList.add('dark');
            themeIcon.className = "fa-solid fa-sun text-amber-400";
        } else {
            htmlElement.classList.remove('dark');
            themeIcon.className = "fa-solid fa-moon text-slate-600";
        }

        function toggleTheme() {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                themeIcon.className = "fa-solid fa-moon text-slate-600";
                localStorage.setItem('arta_theme', 'light');
            } else {
                htmlElement.classList.add('dark');
                themeIcon.className = "fa-solid fa-sun text-amber-400";
                localStorage.setItem('arta_theme', 'dark');
            }
        }

        // Minta izin Notifikasi Sistem saat aplikasi pertama kali dimuat
        if (window.Notification && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // Set default minimum date input ke saat ini
        const nowIso = new Date().toISOString().substring(0, 16);
        document.getElementById('event-date').min = nowIso;
        document.getElementById('event-date').value = nowIso;

        // Jam Live digital pada Pojok Kanan Atas Navbar
        setInterval(() => {
            const d = new Date();
            document.getElementById('live-clock').innerText = d.toLocaleTimeString('id-ID');
        }, 1000);

        // Fungsi Filter Data
        function setFilter(filter) {
            currentFilter = filter;
            ['all', 'active', 'passed'].forEach(f => {
                const btn = document.getElementById(`btn-filter-${f}`);
                if (f === filter) {
                    btn.className = "flex-1 sm:flex-none px-3 py-1.5 rounded-xl text-xs font-bold bg-indigo-600 text-white transition shadow";
                } else {
                    btn.className = "flex-1 sm:flex-none px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 transition shadow-sm";
                }
            });
            renderEvents();
        }

        // Fungsi Menambah Acara Baru
        function addEvent(e) {
            e.preventDefault();
            
            const name = document.getElementById('event-name').value;
            const targetDate = document.getElementById('event-date').value;
            const category = document.getElementById('event-category').value;
            const theme = document.querySelector('input[name="theme"]:checked').value;

            const newEvent = {
                id: 'EVT-' + Date.now(),
                name,
                targetDate,
                category,
                theme,
                notified: false
            };

            events.push(newEvent);
            localStorage.setItem('arta_events_data', JSON.stringify(events));
            document.getElementById('event-name').value = '';
            renderEvents();
        }

        // Fungsi Menghapus Acara
        function deleteEvent(id) {
            if (confirm("Hapus acara ini dari daftar linimasa?")) {
                events = events.filter(evt => evt.id !== id);
                localStorage.setItem('arta_events_data', JSON.stringify(events));
                renderEvents();
            }
        }

        // Fungsi Memicu Pengiriman Notifikasi (Suara + Pop up desktop)
        function triggerNotification(eventName) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = audioCtx.createOscillator();
                let gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.frequency.value = 587.33; 
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc1.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.15);

                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 880; 
                    gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 150);
            } catch (err) {
                console.log("Audio alert blocked.", err);
            }

            if (window.Notification && Notification.permission === "granted") {
                new Notification("⏰ Waktunya Dimulai!", {
                    body: `Acara "${eventName}" sedang berlangsung sekarang!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2693/2693507.png"
                });
            } else {
                alert(`⏰ WAKTUNYA DIMULAI!\n\nAcara "${eventName}" sudah dimulai saat ini!`);
            }
        }

        // Fungsi Render List Komponen Card ke Layar
        function renderEvents() {
            const grid = document.getElementById('events-grid');
            const emptyState = document.getElementById('empty-state');
            const now = new Date().getTime();

            let filtered = events;
            if (currentFilter === 'active') {
                filtered = events.filter(e => new Date(e.targetDate).getTime() > now);
            } else if (currentFilter === 'passed') {
                filtered = events.filter(e => new Date(e.targetDate).getTime() <= now);
            }

            filtered.sort((a, b) => new Date(a.targetDate).getTime() - new Date(b.targetDate).getTime());
            document.getElementById('total-events').innerText = filtered.length;
            grid.innerHTML = '';

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            filtered.forEach(evt => {
                const card = document.createElement('div');
                // Card tiket gradasi tetap solid berwarna kontras agar kontent angka countdown selalu terbaca jelas di kedua mode
                card.className = `p-5 rounded-2xl bg-gradient-to-br ${evt.theme} border border-white/10 shadow-xl relative overflow-hidden flex flex-col justify-between min-h-[170px]`;
                card.setAttribute('data-target', evt.targetDate);
                card.setAttribute('data-id', evt.id);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] uppercase font-bold tracking-wider px-2.5 py-1 rounded-md bg-black/30 backdrop-blur-md text-white/90 border border-white/5">
                                ${evt.category}
                            </span>
                            <button onclick="deleteEvent('${evt.id}')" class="text-white/40 hover:text-rose-400 transition text-sm p-1">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                        <h4 class="text-base font-black text-white mt-3 tracking-wide truncate pr-4">${evt.name}</h4>
                        <p class="text-[10px] text-white/60 font-medium mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${new Date(evt.targetDate).toLocaleString('id-ID', {dateStyle: 'medium', timeStyle: 'short'})}</p>
                    </div>

                    <div class="grid grid-cols-4 gap-2 text-center mt-4 bg-black/20 p-2.5 rounded-xl border border-white/5 backdrop-blur-sm countdown-container">
                        <div>
                            <div class="text-lg font-black text-white tracking-tight days-val">00</div>
                            <div class="text-[8px] uppercase font-bold tracking-widest text-white/50">Hari</div>
                        </div>
                        <div>
                            <div class="text-lg font-black text-white tracking-tight hours-val">00</div>
                            <div class="text-[8px] uppercase font-bold tracking-widest text-white/50">Jam</div>
                        </div>
                        <div>
                            <div class="text-lg font-black text-white tracking-tight minutes-val">00</div>
                            <div class="text-[8px] uppercase font-bold tracking-widest text-white/50">Menit</div>
                        </div>
                        <div>
                            <div class="text-lg font-black text-white tracking-tight seconds-val">00</div>
                            <div class="text-[8px] uppercase font-bold tracking-widest text-white/50">Detik</div>
                        </div>
                    </div>

                    <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center text-center p-4 transition-opacity duration-300 opacity-0 pointer-events-none passed-overlay">
                        <div class="bg-emerald-500 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/30 text-sm mb-1.5">
                            <i class="fa-solid fa-check font-black"></i>
                        </div>
                        <div class="text-sm font-black text-white tracking-wide">${evt.name}</div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-emerald-400 mt-0.5">Acara Selesai ✨</div>
                        <button onclick="deleteEvent('${evt.id}')" class="mt-3 text-[10px] bg-slate-800 hover:bg-rose-900 border border-slate-700 hover:border-rose-700 text-slate-300 hover:text-white px-3 py-1 rounded-lg transition font-bold pointer-events-auto shadow">
                            Hapus Riwayat
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            updateAllCountdowns();
        }

        // Fungsi Inti Logika Kalkulasi Selisih Waktu Waktu Mundur
        function updateAllCountdowns() {
            const now = new Date().getTime();
            const cards = document.querySelectorAll('#events-grid > div');

            cards.forEach(card => {
                const id = card.getAttribute('data-id');
                const targetStr = card.getAttribute('data-target');
                const targetTime = new Date(targetStr).getTime();
                const distance = targetTime - now;

                const overlay = card.querySelector('.passed-overlay');
                const container = card.querySelector('.countdown-container');

                if (distance <= 0) {
                    if(overlay && overlay.classList.contains('opacity-0')) {
                        overlay.classList.remove('opacity-0', 'pointer-events-none');
                        overlay.classList.add('opacity-100');
                        if(container) container.classList.add('hidden');
                    }

                    const idx = events.findIndex(e => e.id === id);
                    if (idx !== -1 && !events[idx].notified) {
                        events[idx].notified = true;
                        localStorage.setItem('arta_events_data', JSON.stringify(events));
                        triggerNotification(events[idx].name);
                    }
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                card.querySelector('.days-val').innerText = String(days).padStart(2, '0');
                card.querySelector('.hours-val').innerText = String(hours).padStart(2, '0');
                card.querySelector('.minutes-val').innerText = String(minutes).padStart(2, '0');
                card.querySelector('.seconds-val').innerText = String(seconds).padStart(2, '0');
            });
        }

        setInterval(updateAllCountdowns, 1000);
        renderEvents();
    </script>
</body>
</html>
